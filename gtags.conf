# ========== 仅保留 C/C++ 源码解析 ==========
langmap=c:.c.h,cpp:.c++.cc.hh.cpp.cxx.hxx.hpp.C.H
# 清空其余语言，不解析 java/python/js/asm/yacc 等
langmapasm=
langmapawk=
langmapcobol=
langmapjava=
langmapmake=
langmapperl=
langmapphp=
langmappython=
langmapsh=
langmapyacc=

# ========== 全局过滤跳过目录/文件 ==========
# 目录末尾带 / 表示递归整目录跳过，通配符 * 匹配后缀
skip=\
build/,out/,output/,obj/,bin/,lib/,dist/,release/,debug/,tmp/,\
third_party/,thirdparty/,vendor/,extern/,external/,\
test/,tests/,ut/,unit_test/,benchmark/,demo/,samples/,\
.git/,svn/,hg/,CMakeFiles/,cmake/,autotools/,m4/,\
*.o,*.obj,*.a,*.so,*.dll,*.dylib,*.exe,*.bin,\
*.log,*.bak,*.swp,*.tmp,*.cache,*.pyc,*.class

# ========== 性能优化配置 ==========
# 不跟随软链接（避免循环目录、重复索引）
follow_symlink=no
# 启用缓存加速更新
cache=yes
# 忽略大小写（可选，Windows 源码可开，Linux 建议关闭）
ignore_case=no
